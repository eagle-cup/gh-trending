  .hero h1 {
    font-size: clamp(2rem, 5vw, 3.8rem); font-weight: 900;
    background: linear-gradient(135deg, #a29bfe, #6c5ce7, #00cec9);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: .5rem;
  }
  .hero .badge {
    display: inline-block; background: #1a1a2e; color: #a29bfe;
    padding: .3rem 1rem; border-radius: 999px; font-size: .8rem;
    border: 1px solid #2a2a4a; margin-bottom: 1rem;
  }
  .hero p { color: #888; font-size: 1.1rem; max-width: 650px; margin: 0 auto; }
  .hero .stats {

  }
  .stat { text-align: center; }
  .stat-num { font-size: 2rem; font-weight: 800; color: #fff; }
  .stat-label { font-size: .75rem; color: #666; text-transform: uppercase; letter-spacing: .05em; }

  /* Container */
  .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

  /* Section */
  .section { padding: 4rem 0; }
  .section-title {
    font-size: 1.8rem; font-weight: 800; margin-bottom: .5rem;
    display: flex; align-items: center; gap: .75rem;
  }
  .section-title .emoji { font-size: 1.5rem; }
  .section-subtitle { color: #666; margin-bottom: 2rem; font-size: .95rem; }

  .timeline {
    position: relative; padding-left: 2rem;
  }
  .timeline::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px; background: linear-gradient(to bottom, #6c5ce7, #00cec9, transparent);
  }
  .timeline-item {
    position: relative; padding: 0 0 2.5rem 1.5rem;
  }
  .timeline-item::before {
    content: ''; position: absolute; left: -2.35rem; top: .3rem;
    width: 12px; height: 12px; border-radius: 50%;
    background: #6c5ce7; border: 2px solid #0a0a0f;
  }
  .timeline-item:nth-child(2)::before { background: #00b894; }
  .timeline-item:nth-child(3)::before { background: #fdcb6e; }
  .timeline-item:nth-child(4)::before { background: #e17055; }
  .timeline-year { font-size: .75rem; font-weight: 700; color: #6c5ce7; }
  .timeline-item:nth-child(2) .timeline-year { color: #00b894; }
  .timeline-item:nth-child(3) .timeline-year { color: #fdcb6e; }
  .timeline-item:nth-child(4) .timeline-year { color: #e17055; }

  .tool-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }
  .tool-card {
    background: #121218; border-radius: 16px; padding: 1.5rem;
    border: 1px solid #1e1e2a;

  }
  .tool-card:hover { border-color: #6c5ce7; transform: translateY(-2px); }
  .tool-card-header {
    display: flex; align-items: center; gap: 1rem; margin-bottom: .75rem;
  }
  .tool-icon {
    width: 44px; height: 44px; border-radius: 12px;

  .tool-name { font-weight: 700; font-size: 1.05rem; }
  .tool-org { font-size: .75rem; color: #666; }

  .tag-extension { background: #1b3d2d; color: #55efc4; }

  .tag-paid { background: #2d1b1b; color: #ff7675; }

  .tool-stats {
    display: flex; gap: 1rem; font-size: .75rem; color: #555;

  .tool-stat { display: flex; align-items: center; gap: .25rem; }

    border: 1px solid #1e1e2a; overflow-x: auto;

  .term-grid {

  .term-desc { font-size: .78rem; color: #888; line-height: 1.5; }

  .path-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;

  .path-card:nth-child(1)::before { background: linear-gradient(90deg, #00b894, #00cec9); }
  .path-card:nth-child(2)::before { background: linear-gradient(90deg, #6c5ce7, #a29bfe); }
  .path-card:nth-child(3)::before { background: linear-gradient(90deg, #fdcb6e, #e17055); }
  .path-level { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; margin-bottom: .5rem; }
  .path-card:nth-child(1) .path-level { color: #00cec9; }
  .path-card:nth-child(2) .path-level { color: #a29bfe; }
  .path-card:nth-child(3) .path-level { color: #fdcb6e; }
  .path-title { font-size: 1.1rem; font-weight: 700; margin-bottom: .5rem; }
  .path-items { list-style: none; font-size: .82rem; color: #888; }
  .path-items li { margin-bottom: .4rem; padding-left: 1.2rem; position: relative; }
  .path-items li::before { content: '›'; position: absolute; left: 0; color: #6c5ce7; font-weight: 700; }

  .resource-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: .75rem;

  .resource-card {
    background: #121218; border-radius: 12px; padding: 1rem 1.25rem;

  .resource-type { font-size: .65rem; color: #6c5ce7; font-weight: 600; text-transform: uppercase; }
  .resource-name { font-weight: 600; margin: .15rem 0; font-size: .9rem; }
  .resource-desc { font-size: .75rem; color: #666; }

  .spotlight {
    background: linear-gradient(135deg, #1a1040, #0a0a0f);
    border: 1px solid #2a1a5a;
    border-radius: 20px; padding: 2rem;
    margin: 2rem 0;
    position: relative; overflow: hidden;

  .spotlight::before {

  .spotlight h3 { font-size: 1.4rem; font-weight: 800; margin-bottom: .75rem; color: #a29bfe; }

  .footer {

  .footer a { color: #6c5ce7; text-decoration: none; }

    .path-grid { grid-template-columns: 1fr; }
    .resource-grid { grid-template-columns: 1fr; }
    .hero { min-height: 50vh; padding: 3rem 1.5rem; }
    .section { padding: 2.5rem 0; }

  /* Tab filters */
  .filter-bar {
    display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem;

  .filter-btn {
    background: #121218; border: 1px solid #1e1e2a; color: #888;

  .filter-btn:hover { border-color: #6c5ce7; color: #e4e4ed; }
  .filter-btn.active { background: #2d1b69; border-color: #6c5ce7; color: #a29bfe; }

  .term-category { font-size: .65rem; color: #555; margin-bottom: .15rem; }
</style>

function h(tag, attrs = {}, children = []) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else if (k === 'innerHTML') el.innerHTML = v;
    else el.setAttribute(k, v);
  }
  if (typeof children === 'string') el.innerHTML = children;
  else if (Array.isArray(children)) children.forEach(c => { if (c != null) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  else if (children instanceof Node) el.appendChild(children);
  return el;
}

function renderToolCard(tool) {
  const tagsMap = {
    agent: { label: 'Agent', cls: 'tag-agent' },
    ide: { label: 'IDE', cls: 'tag-ide' },
    extension: { label: '扩展', cls: 'tag-extension' },
    paid: { label: '付费', cls: 'tag-paid' },
    free: { label: '免费', cls: 'tag-free' },
    opensource: { label: '开源', cls: 'tag-opensource' },
  };
  return h('div', { className: 'tool-card', style: tool.highlight ? 'border-color:#3a2a6a;background:#1a1040' : '' }, [
    h('div', { className: 'tool-card-header' }, [
      h('div', { className: 'tool-icon', style: `background:${tool.color}22;color:${tool.color};border:1px solid ${tool.color}44` }, tool.icon),
      h('div', { className: 'tool-meta' }, [
        h('div', { className: 'tool-name' }, tool.name),
        h('div', { className: 'tool-org' }, tool.org),
      ]),
    ]),
    h('div', { className: 'tool-tags' },
      tool.tags.map(t => {
        const m = tagsMap[t];
        return m ? h('span', { className: `tag ${m.cls}` }, m.label) : null;
      })
    ),
    h('div', { className: 'tool-desc' }, tool.desc),
    h('div', { className: 'tool-stats' },
      tool.stats.map(s => h('span', { className: 'tool-stat' }, `· ${s}`))
    ),
  ]);
}

function renderDiagram() {
  const cx = 450, cy = 360, r = 360;
  return h('svg', { viewBox: '0 0 900 720' },
    LANDSCAPE_POSITIONS.map((item, i) => {
      const x = (item.x / 100) * 900;
      const y = (item.y / 100) * 720;
      const size = item.size || 14;
      const color = item.color || '#888';
      const opacity = item.opacity ?? 1;
      const fill = item.bold ? 'none' : color;
      const stroke = item.bold ? color : 'none';
      const strokeWidth = item.bold ? 2 : 0;
      const fontWeight = item.bold ? 800 : 500;
      const textFill = item.bold ? color : opacity < 1 ? `${color}${Math.floor(opacity * 255).toString(16)}` : color;
      return h('text', {
        x, y,
        'text-anchor': 'middle',
        'dominant-baseline': 'middle',
        'font-size': size,
        'font-weight': fontWeight,
        fill: textFill,
        stroke,
        'stroke-width': strokeWidth,
        style: 'font-family:Inter,-apple-system,sans-serif;letter-spacing:.02em',
      }, item.label);
    })
  );
}
